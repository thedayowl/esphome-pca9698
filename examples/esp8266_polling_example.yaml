# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  PCA9698 External Component — ESP8266 Example                             ║
# ║                                                                            ║
# ║  Demonstrates:                                                             ║
# ║  • Single PCA9698 at 0x20                                                 ║
# ║  • Polling mode only (no interrupt pin)                                   ║
# ║  • Output-enable dimmer via ESP8266 software PWM                          ║
# ║  • All 40 pins assigned (32 outputs + 8 inputs)                           ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

esphome:
  name: pca9698-demo-esp8266

esp8266:
  board: nodemcuv2

logger:
  level: INFO

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:
ota:
  - platform: esphome

# ── External component source ─────────────────────────────────────────────────
external_components:
  - source:
      type: git
      url: https://github.com/thedayowl/esphome-pca9698
      ref: main
    components: [pca9698]

# ── I2C bus ───────────────────────────────────────────────────────────────────
i2c:
  sda: D2   # GPIO4
  scl: D1   # GPIO5
  scan: true

# ── ESP8266 software PWM for Output-Enable dimmer ────────────────────────────
output:
  - platform: esp8266_pwm
    id: pca9698_oe_pwm
    pin: D5    # GPIO14 → OE pin of PCA9698
    frequency: 1000 Hz
    inverted: true       # OE is active-low; invert so 100 % = fully on, 0 % = off

# ── PCA9698 – polling mode, 50 ms interval ────────────────────────────────────
pca9698:
  - id: io_expander
    address: 0x20
    polling_interval: 50ms   # No interrupt pin – use polling
    oe_output_id: pca9698_oe_pwm
    dimmer_level: 100%        # 100 % = outputs fully enabled at startup

# ══════════════════════════════════════════════════════════════════════════════
# Binary sensors – Port 0 (pins 0–7) as inputs
# ══════════════════════════════════════════════════════════════════════════════

binary_sensor:
  - platform: gpio
    name: "Input Pin 0"
    pin: { pca9698: io_expander, number: 0, mode: INPUT }

  - platform: gpio
    name: "Input Pin 1"
    pin: { pca9698: io_expander, number: 1, mode: INPUT }

  - platform: gpio
    name: "Input Pin 2"
    pin: { pca9698: io_expander, number: 2, mode: INPUT }

  - platform: gpio
    name: "Input Pin 3"
    pin: { pca9698: io_expander, number: 3, mode: INPUT }

  - platform: gpio
    name: "Input Pin 4"
